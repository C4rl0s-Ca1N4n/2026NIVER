<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Arquivo Recuperado - Encerramento ARG</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:#0a2e0a;
    color:#c8ffc8;
    font-family: monospace;
}

/* layout geral */
body{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* topo */
#topo{
    width:100%;
    text-align:center;
    padding:12px;
    border-bottom:2px solid #3fa63f;
    background:#0f3f0f;
    font-weight:bold;
    font-size:clamp(14px, 2.5vw, 18px);
    animation: brilhoTop 3s infinite alternate;
}

@keyframes brilhoTop {
    0% { border-color:#3fa63f; }
    50% { border-color:#5fc95f; }
    100% { border-color:#3fa63f; }
}

/* mensagem */
#mensagem{
    text-align:center;
    padding:20px;
    font-size:clamp(16px, 4vw, 20px);
    max-width:700px;
}

/* conteúdo */
#conteudo{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    width:100%;
    padding:10px;
}

/* capa responsiva */
#capa{
    width:70vw;
    max-width:320px;
    cursor:pointer;
    border:2px solid #3fa63f;
    transition:0.3s;
    animation: brilhoBorda 2s infinite alternate;
}

#capa:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #5fc95f;
}

@keyframes brilhoBorda {
    0% { border-color:#3fa63f; box-shadow:0 0 5px #3fa63f; }
    50% { border-color:#5fc95f; box-shadow:0 0 15px #5fc95f; }
    100% { border-color:#3fa63f; box-shadow:0 0 5px #3fa63f; }
}

/* botões */
#acoes{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

button{
    background:#3fa63f;
    border:2px solid #1e5c1e;
    padding:12px 20px;
    cursor:pointer;
    font-family:monospace;
    color:#f0fff0;
    font-size:16px;
    min-width:140px;
    transition:0.3s;
    animation: brilhoBotao 2s infinite alternate;
}

button:hover{
    background:#5fc95f;
}

@keyframes brilhoBotao {
    0% { border-color:#1e5c1e; box-shadow:0 0 5px #3fa63f; }
    50% { border-color:#5fc95f; box-shadow:0 0 15px #5fc95f; }
    100% { border-color:#1e5c1e; box-shadow:0 0 5px #3fa63f; }
}

/* leitor fullscreen */
#leitorFullscreen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100dvh;
    background:#0a2e0a;
    z-index:9999;
    overflow:hidden;
}

#leitorFullscreen.vibrando{
    animation: vibrar 0.1s infinite;
}

@keyframes vibrar {
    0% { transform: translate(0,0); }
    25% { transform: translate(1px,-1px); }
    50% { transform: translate(-1px,1px); }
    75% { transform: translate(1px,1px); }
    100% { transform: translate(0,0); }
}

#leitorFullscreen iframe{
    width:100%;
    height:100%;
    border:none;
}

/* mensagem final */
#mensagemFinal {
    display:none;
    text-align:center;
    font-size:clamp(16px, 4vw, 22px);
    color:#d0ffd0;
    padding:20px;
    animation: brilhoMensagem 3s infinite alternate;
}

@keyframes brilhoMensagem {
    0% { color:#c8ffc8; }
    50% { color:#e0ffe0; }
    100% { color:#c8ffc8; }
}

</style>
</head>
<body>

<div id="topo">
ARQUIVO RECUPERADO // REALIDADE ALTERADA
</div>

<div id="mensagem">
Fragmento restaurado.<br>
PARABÉNS, A TRAVESSIA CHEGOU AO FIM.<br>
O multiverso agora aguarda por você em novas aventuras…
</div>

<div id="conteudo">
    <img id="capa" src="assets/Livro3.png" onclick="abrirLeitura()">

    <div id="acoes">
        <a href="assets/Mundos Deslocados.pdf" download>
            <button>BAIXAR</button>
        </a>
    </div>
</div>

<div id="mensagemFinal">
PARABÉNS, A TRAVESSIA CHEGOU AO FIM.<br>
O multiverso agora aguarda por você em novas aventuras…
</div>

<div id="leitorFullscreen">
    <iframe src="assets/Mundos Deslocados.pdf"></iframe>
</div>

<audio id="bg-music" loop>
  <source src="assets/N25.mp3" type="audio/mpeg">
</audio>

<script>

const bgMusic = document.getElementById("bg-music");

window.addEventListener("load", () => {
  bgMusic.volume = 0.4;
  bgMusic.play().catch(() => {});
});

function abrirLeitura(){
    const leitor = document.getElementById("leitorFullscreen");
    const mensagemFinal = document.getElementById("mensagemFinal");

    leitor.style.display = "block";
    leitor.classList.add("vibrando");

    setTimeout(() => {
        mensagemFinal.style.display = "block";
    }, 1000);

    if (leitor.requestFullscreen) {
        leitor.requestFullscreen();
    }
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        const leitor = document.getElementById("leitorFullscreen");
        const mensagemFinal = document.getElementById("mensagemFinal");

        leitor.style.display = "none";
        leitor.classList.remove("vibrando");
        mensagemFinal.style.display = "none";
    }
});

</script>

</body>
</html>
