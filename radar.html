<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rastreamento Dimensional</title>

<style>
body{
    margin:0;
    background:black;
    color:#0f0;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#titulo{
    text-align:center;
    padding:10px;
    border-bottom:1px solid #0f0;
    letter-spacing:2px;
}

#radarContainer{
    flex:1;
    position:relative;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    background:#001100;
    touch-action:none;
}

.glitch{
    animation: glitch 0.1s infinite;
}

@keyframes glitch{
    0%{transform:translate(3px,-2px);}
    50%{transform:translate(-3px,2px);}
    100%{transform:translate(2px,2px);}
}

#status{
    text-align:center;
    padding:10px;
    border-top:1px solid #0f0;
}

/* símbolo agora livre (não centralizado) */
#simbolo{
    position:absolute;
    transform:translate(-50%,-50%) scale(0);
    font-size:80px;
    opacity:0;
    transition:all 0.3s ease;
    pointer-events:none;
}

#simbolo.ativo{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}
</style>
</head>
<body>

<div id="titulo">LOCALIZANDO FRATURAS DIMENSIONAIS</div>

<div id="radarContainer">
    <canvas id="radar"></canvas>
    <div id="simbolo">⟁</div>
</div>

<div id="status">FALHAS: 0/3</div>

<script>

const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");
const container = document.getElementById("radarContainer");
const status = document.getElementById("status");
const simbolo = document.getElementById("simbolo");

function resizeCanvas(){
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}

let ponto = { x:100, y:100 };
let alvo = { x:0, y:0 };

function novoAlvo(){
    alvo.x = Math.random() * canvas.width;
    alvo.y = Math.random() * canvas.height;
}

resizeCanvas();
novoAlvo();

window.addEventListener("resize", ()=>{
    resizeCanvas();
    novoAlvo();
});


// ===== ÁUDIO =====
let audioCtx, osc, gain;

function iniciarAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        osc = audioCtx.createOscillator();
        gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.value = 100;
        gain.gain.value = 0;

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
    }
}


// ===== CONTROLES =====
function setPos(x,y){
    ponto.x = x;
    ponto.y = y;
    iniciarAudio();
}

canvas.addEventListener("mousemove", e=>{
    const r = canvas.getBoundingClientRect();
    setPos(e.clientX - r.left, e.clientY - r.top);
});

canvas.addEventListener("touchmove", e=>{
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    setPos(t.clientX - r.left, t.clientY - r.top);
});


// ===== DESENHO =====
let pulso = 0;

function desenhar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="#0f0";

    for(let i=0;i<canvas.width;i+=80){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();
    }

    for(let i=0;i<canvas.height;i+=80){
        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(canvas.width,i);
        ctx.stroke();
    }

    pulso += 2;
    ctx.beginPath();
    ctx.arc(ponto.x,ponto.y,pulso,0,Math.PI*2);
    ctx.stroke();

    if(pulso > 300) pulso = 0;

    ctx.fillStyle="#0f0";
    ctx.beginPath();
    ctx.arc(ponto.x,ponto.y,6,0,Math.PI*2);
    ctx.fill();
}


// ===== LÓGICA =====
function dist(){
    let dx = ponto.x - alvo.x;
    let dy = ponto.y - alvo.y;
    return Math.sqrt(dx*dx + dy*dy);
}

let falhas = 0;
let revelando = false;

function loop(){
    desenhar();

    let d = dist();
    let prox = Math.max(0, 300 - d);

    if(gain){
        gain.gain.value = prox/600;
        osc.frequency.value = 100 + prox*2;
    }

    if(prox > 100){
        container.classList.add("glitch");
    } else {
        container.classList.remove("glitch");
    }

    if(d < 20 && !revelando){
        capturarFalha();
    }

    requestAnimationFrame(loop);
}

function capturarFalha(){
    revelando = true;
    falhas++;

    // 🎯 símbolo aparece no ponto da falha
    simbolo.style.left = alvo.x + "px";
    simbolo.style.top = alvo.y + "px";

    simbolo.classList.add("ativo");

    status.innerText = "FALHAS: " + falhas + "/3";

    if(gain) gain.gain.value = 0;

    setTimeout(()=>{
        simbolo.classList.remove("ativo");

        if(falhas >= 3){
            finalizar();
        } else {
            novoAlvo();
            revelando = false;
        }
    },800);
}

function finalizar(){
    status.innerText = "RUPTURA ESTÁVEL. ACESSO LIBERADO.";

    setTimeout(()=>{
        window.location.href="livro1.html";
    },2000);
}

loop();

</script>

</body>
</html>
