<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Arquivo Recuperado</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    color:#0f0;
    font-family:monospace;
}

body{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* topo */
#topo{
    width:100%;
    text-align:center;
    padding:12px;
    border-bottom:1px solid #0f0;
    font-size:clamp(14px, 2.5vw, 18px);
    letter-spacing:2px;
}

/* mensagem */
#mensagem{
    text-align:center;
    padding:20px;
    font-size:clamp(16px, 4vw, 20px);
    max-width:600px;
}

/* conteúdo */
#conteudo{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    width:100%;
    padding:10px;
}

/* capa responsiva */
#capa{
    width:70vw;           /* ocupa boa parte da tela no celular */
    max-width:300px;      /* limita no desktop */
    cursor:pointer;
    border:1px solid #0f0;
    transition:0.3s;
}

#capa:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #0f0;
}

/* botões */
#acoes{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

button{
    background:#0f0;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    font-family:monospace;
    font-size:16px;
    min-width:120px;
}

/* leitor fullscreen */
#leitorFullscreen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100dvh;
    background:black;
    z-index:9999;
}

#leitorFullscreen iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
<body>

<div id="topo">
ARQUIVO RECUPERADO // REALIDADE ALTERADA
</div>

<div id="mensagem">
Fragmento restaurado.<br>
Toque na energia emanada para acessar o manuscrito.
</div>

<div id="conteudo">
    <img id="capa" src="assets/Livro2.png" onclick="abrirLeitura()">

    <div id="acoes">
        <a href="assets/Herdeira da Dor.pdf" download>
            <button>BAIXAR</button>
        </a>

        <button onclick="proximaFase()">Avançar</button>
    </div>
</div>

<div id="leitorFullscreen">
    <iframe src="assets/Herdeira da Dor.pdf"></iframe>
</div>

<audio id="bg-music" loop>
  <source src="assets/N25.mp3" type="audio/mpeg">
</audio>

<script>

const bgMusic = document.getElementById("bg-music");

window.addEventListener("load", () => {
  bgMusic.volume = 0.4;
  bgMusic.play().catch(() => {
    console.log("Autoplay bloqueado");
  });
});

function abrirLeitura(){
    const leitor = document.getElementById("leitorFullscreen");
    leitor.style.display = "block";

    if (leitor.requestFullscreen) {
        leitor.requestFullscreen();
    }
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        document.getElementById("leitorFullscreen").style.display = "none";
    }
});

function proximaFase(){
    window.location.href="timer.html";
}

</script>

</body>
</html>
