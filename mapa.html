<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Rastreamento Multiversal</title>

<style>
body{
    margin:0;
    background:black;
    color:#00f0ff;
    font-family:monospace;
    text-align:center;
}

h1{
    font-size:18px;
    margin:10px 0;
}

#mapContainer{
    position:relative;
    width:100%;
    height:50vh;
    max-height:500px;
}

#worldMap{
    width:100%;
    height:100%;
    object-fit:contain;
}

#point{
    position:absolute;
    width:6px;
    height:6px;
    background:red;
    border-radius:50%;
    box-shadow:0 0 5px red;
    transform:translate(-50%,-50%);
}

.controls{
    margin-top:10px;
    padding:0 15px;
}

input[type=range]{
    width:100%;
}

#status{
    margin-top:8px;
    min-height:24px;
}

#foundList{
    margin-top:6px;
    font-size:14px;
    color:#00ff88;
}
</style>
</head>

<body>

<h1>SISTEMA DE RASTREAMENTO MULTIVERSAL</h1>
<p>Use os controles abaixo para rastrear a localização do Viajante.</p>

<div id="mapContainer">
    <img src="assets/mapa.jpg" id="worldMap">
    <div id="point"></div>
</div>

<div class="controls">
    Eixo X
    <input type="range" id="xSlider" min="0" max="100" value="50">
    <br><br>
    Eixo Y
    <input type="range" id="ySlider" min="0" max="100" value="50">
</div>

<div id="status"></div>

<div id="foundList">
    Locais Detectados:<br>
    <span id="nzStatus">[ ] Ponto 1</span><br>
    <span id="lonStatus">[ ] Ponto 2</span><br>
    <span id="brStatus">[ ] Ponto 3</span>
</div>

<script>

const map = document.getElementById("worldMap");
const point = document.getElementById("point");
const xSlider = document.getElementById("xSlider");
const ySlider = document.getElementById("ySlider");
const status = document.getElementById("status");

let found = {
    nz:false,
    london:false,
    brazil:false
};

const targets = {
    nz:{x:91,y:81.5},
    london:{x:45,y:34},
    brazil:{x:34,y:72}
};

// Som compatível com mobile (só ativa após toque)
let audioCtx;
function initAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}
document.body.addEventListener("touchstart", initAudio, {once:true});
document.body.addEventListener("click", initAudio, {once:true});

function beep(){
    if(!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type="sine";
    osc.frequency.value=900;
    gain.gain.value=0.05;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
}

function near(val,target,tol=2){
    return Math.abs(val-target)<=tol;
}

function distance(x,y,targetX,targetY){
    return Math.sqrt((x-targetX)**2+(y-targetY)**2);
}

function updatePoint(){

    const rect = map.getBoundingClientRect();

    const naturalRatio = map.naturalWidth / map.naturalHeight;
    const containerRatio = rect.width / rect.height;

    let renderWidth, renderHeight, offsetX, offsetY;

    if(containerRatio > naturalRatio){
        renderHeight = rect.height;
        renderWidth = rect.height * naturalRatio;
        offsetX = (rect.width - renderWidth) / 2;
        offsetY = 0;
    }else{
        renderWidth = rect.width;
        renderHeight = rect.width / naturalRatio;
        offsetX = 0;
        offsetY = (rect.height - renderHeight) / 2;
    }

    let xPercent = xSlider.value;
    let yPercent = ySlider.value;

    let x = offsetX + (xPercent/100)*renderWidth;
    let y = offsetY + (yPercent/100)*renderHeight;

    point.style.left = x+"px";
    point.style.top = y+"px";

    radarSound(xPercent,yPercent);
    checkLocation(xPercent,yPercent);
}

function radarSound(x,y){

    let minDist = 999;

    Object.values(targets).forEach(t=>{
        let d = distance(x,y,t.x,t.y);
        if(d<minDist) minDist=d;
    });

    if(minDist<15){
        beep();
    }
}

function checkLocation(x,y){

    if(!found.nz && near(x,targets.nz.x)&&near(y,targets.nz.y)){
        found.nz=true;
        status.innerHTML="📡 Nova Zelândia localizada";
        document.getElementById("nzStatus").innerHTML="[✔] Nova Zelândia";
    }

    if(!found.london && near(x,targets.london.x)&&near(y,targets.london.y)){
        found.london=true;
        status.innerHTML="📡 Londres localizada";
        document.getElementById("lonStatus").innerHTML="[✔] Londres";
    }

    if(!found.brazil && near(x,targets.brazil.x)&&near(y,targets.brazil.y)){
        found.brazil=true;
        status.innerHTML="📡 Brasil localizado";
        document.getElementById("brStatus").innerHTML="[✔] Brasil";
    }

    if(found.nz && found.london && found.brazil){
        status.innerHTML="⚠ Conexão com o Viajante detectada…";

        setTimeout(()=>{
            window.location.href="seq.html";
        },2000);
    }
}

xSlider.addEventListener("input",updatePoint);
ySlider.addEventListener("change",updatePoint);
ySlider.addEventListener("input",updatePoint);
window.addEventListener("resize",updatePoint);

updatePoint();

</script>

</body>
</html>
